<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake 2026 - Neon Edition</title>
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #ff00ff;
      --accent: #ffd700;
      --dark: #0a0a1f;
      --darker: #05050f;
      --light: #e0f8ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--darker) 0%, #1a0033 50%, var(--dark) 100%);
      color: var(--light);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Fondo con efecto sutil */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0, 245, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(0, 245, 255, 0.5);
      letter-spacing: -2px;
    }

    /* Contenedores principales */
    .screen {
      background: rgba(15, 15, 35, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 620px;
      width: 92%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6),
                  inset 0 0 40px rgba(0, 245, 255, 0.1);
      transition: all 0.4s ease;
    }

    /* Perfil */
    .profile-screen h1 {
      margin-bottom: 8px;
      font-size: 3.2rem;
    }

    .avatar-preview {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid var(--primary);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.6);
      background: rgba(0, 245, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      transition: transform 0.4s ease;
    }

    .avatar-preview:hover {
      transform: scale(1.08);
    }

    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #a0d8ff;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(10, 10, 31, 0.8);
      border: 2px solid rgba(0, 245, 255, 0.4);
      border-radius: 14px;
      color: white;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
      background: rgba(10, 10, 31, 0.95);
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #00b8ff);
      color: white;
      box-shadow: 0 10px 30px rgba(0, 245, 255, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 15px 40px rgba(0, 245, 255, 0.6);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn-secondary:hover {
      background: rgba(0, 245, 255, 0.1);
      transform: translateY(-3px);
    }

    /* Leaderboard */
    .leaderboard-entry {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      margin-bottom: 12px;
      border-left: 5px solid var(--primary);
      transition: all 0.3s ease;
    }

    .leaderboard-entry:hover {
      transform: translateX(8px);
      background: rgba(0, 245, 255, 0.15);
    }

    .rank-number {
      font-size: 1.8rem;
      font-weight: 900;
      width: 50px;
      text-align: center;
    }

    /* Modos de juego */
    .mode-btn {
      background: linear-gradient(145deg, rgba(0, 245, 255, 0.1), rgba(255, 0, 255, 0.1));
      border: 2px solid rgba(0, 245, 255, 0.4);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      overflow: hidden;
    }

    .mode-btn:hover {
      border-color: var(--secondary);
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 30px 70px rgba(255, 0, 255, 0.3);
    }

    .mode-icon {
      font-size: 4.5rem;
      margin-bottom: 15px;
      transition: transform 0.6s ease;
    }

    .mode-btn:hover .mode-icon {
      transform: scale(1.25) rotate(12deg);
    }

    /* Canvas */
    .game-canvas-wrapper {
      background: rgba(5, 5, 15, 0.9);
      border-radius: 24px;
      padding: 8px;
      box-shadow: 0 0 60px rgba(0, 245, 255, 0.4),
                  inset 0 0 30px rgba(0, 0, 0, 0.8);
      border: 2px solid rgba(0, 245, 255, 0.3);
    }

    canvas {
      image-rendering: pixelated;
      border-radius: 18px;
    }

    /* Game Over */
    .game-over-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .game-over-content {
      background: linear-gradient(135deg, #0f0f2e, #1a0033);
      border: 3px solid var(--primary);
      border-radius: 28px;
      padding: 50px 40px;
      text-align: center;
      max-width: 460px;
      box-shadow: 0 0 80px rgba(0, 245, 255, 0.5);
    }

    .game-over-icon {
      font-size: 5rem;
      animation: deathShake 0.8s ease;
    }

    @keyframes deathShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-15px); }
      75% { transform: translateX(15px); }
    }

    /* Controles móviles */
    .control-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 2rem;
      width: 70px;
      height: 70px;
      border-radius: 18px;
      border: none;
      box-shadow: 0 8px 25px rgba(0, 245, 255, 0.4);
    }

    .control-btn:active {
      transform: scale(0.85);
    }

    /* Animaciones generales */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .screen {
      animation: fadeInUp 0.6s ease forwards;
    }
  </style>
</head>
<body>

  <!-- Pantalla de Perfil -->
  <div class="screen profile-screen" id="profileScreen">
    <h1 style="text-align:center; margin-bottom:10px;">🐍 SNAKE 2026</h1>
    <p style="text-align:center; opacity:0.8; margin-bottom:30px;">Neon Edition</p>

    <div style="text-align:center; margin-bottom:30px;">
      <div class="avatar-preview" id="avatarPreview">👤</div>
    </div>

    <div class="form-group">
      <label>Nombre de Jugador</label>
      <input type="text" id="username" placeholder="Ej: ChizuSnake" maxlength="16">
    </div>

    <div class="form-group">
      <label>Contraseña (para guardar progreso)</label>
      <input type="password" id="password" placeholder="••••••••" maxlength="20">
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:30px;">
      <button class="btn btn-primary" id="continueBtn">JUGAR</button>
      <button class="btn btn-secondary" id="leaderboardViewBtn">🏆 Ranking</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="screen leaderboard-screen hidden" id="leaderboardScreen">
    <h1 style="text-align:center; margin-bottom:10px;">🏆 RANKING GLOBAL</h1>
    <div id="leaderboardContainer" style="max-height:480px; overflow-y:auto; padding-right:10px;"></div>
    <button class="btn btn-primary" id="backToProfileBtn" style="width:100%; margin-top:25px;">← Volver</button>
  </div>

  <!-- Selector de Modo -->
  <div class="screen mode-selector hidden" id="modeSelector">
    <div style="text-align:center; margin-bottom:30px;">
      <div id="userAvatarSmall" style="font-size:3rem; margin-bottom:10px;">👤</div>
      <div id="userNameDisplay" style="font-size:1.4rem; font-weight:700;"></div>
    </div>

    <h1 style="text-align:center; margin-bottom:40px;">Elige tu Modo</h1>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:25px;">
      <button class="mode-btn" id="pcMode">
        <div class="mode-icon">🖥️</div>
        <h3>Modo PC</h3>
        <p style="opacity:0.7;">Teclado • Rápido</p>
      </button>
      <button class="mode-btn" id="mobileMode">
        <div class="mode-icon">📱</div>
        <h3>Modo Móvil</h3>
        <p style="opacity:0.7;">Táctil • Adaptado</p>
      </button>
    </div>
  </div>

  <!-- Pantalla del Juego -->
  <div class="screen game-container hidden" id="gameContainer" style="padding:25px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <button class="btn btn-secondary" id="backBtn" style="padding:10px 20px; font-size:0.95rem;">← Menú</button>
      
      <div style="text-align:center;">
        <div style="font-size:0.9rem; opacity:0.7;">PUNTUACIÓN</div>
        <div id="score" style="font-size:2.4rem; font-weight:900; color:var(--accent);">0</div>
      </div>

      <div style="text-align:center;">
        <div style="font-size:0.9rem; opacity:0.7;">RÉCORD</div>
        <div id="highScore" style="font-size:1.6rem; font-weight:700; color:var(--primary);">0</div>
      </div>
    </div>

    <div class="game-canvas-wrapper">
      <canvas id="gameCanvas" width="420" height="420"></canvas>
    </div>

    <!-- Controles móviles -->
    <div id="mobileControls" class="hidden" style="margin-top:25px; display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:260px; margin-left:auto; margin-right:auto;">
      <div></div>
      <button class="control-btn" id="btnUp">▲</button>
      <div></div>
      <button class="control-btn" id="btnLeft">◄</button>
      <button class="control-btn" id="btnDown">▼</button>
      <button class="control-btn" id="btnRight">►</button>
    </div>
  </div>

  <!-- Game Over -->
  <div class="game-over-modal" id="gameOverModal">
    <div class="game-over-content">
      <div class="game-over-icon">💥</div>
      <h2 style="margin:15px 0 25px; font-size:2.4rem; color:#ff3366;">¡GAME OVER!</h2>
      
      <div style="background:rgba(255,255,255,0.08); border-radius:16px; padding:20px; margin:20px 0;">
        <p style="margin-bottom:10px;">Puntuación Final: <span id="finalScore" style="font-size:1.8rem; color:var(--accent); font-weight:900;"></span></p>
        <p>Mejor Récord: <span id="bestScore" style="color:var(--primary); font-weight:700;"></span></p>
      </div>

      <div style="display:flex; gap:15px;">
        <button class="btn btn-primary" id="restartBtn" style="flex:1;">JUGAR DE NUEVO</button>
        <button class="btn btn-secondary" id="menuBtn" style="flex:1;">Menú Principal</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== Variables y Clases ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 20;
    const tileCount = 21;
    canvas.width = gridSize * tileCount;
    canvas.height = gridSize * tileCount;

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 10};
    let dx = 0, dy = 0;
    let score = 0;
    let highScore = 0;
    let gameLoop;
    let gameSpeed = 90;
    let isMobileMode = false;
    let gameActive = false;

    // Perfil y Leaderboard
    let username = localStorage.getItem('snakeUsername') || '';
    let avatar = localStorage.getItem('snakeAvatar') || '👤';
    let password = localStorage.getItem('snakePassword') || '';

    const leaderboardKey = 'snakeNeonLeaderboard';

    // ==================== Funciones UI ====================
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(screenId).classList.remove('hidden');
    }

    function updateProfileUI() {
      document.getElementById('userNameDisplay').textContent = username || 'Jugador';
      document.getElementById('avatarPreview').innerHTML = typeof avatar === 'string' && (avatar.startsWith('data:') || avatar.startsWith('http')) 
        ? `<img src="${avatar}" alt="Avatar">` : avatar;
    }

    // ==================== Leaderboard ====================
    function getLeaderboard() {
      const data = localStorage.getItem(leaderboardKey);
      return data ? JSON.parse(data) : [];
    }

    function saveScore() {
      let lb = getLeaderboard();
      const existing = lb.findIndex(entry => entry.username === username);
      
      if (existing !== -1) {
        if (score > lb[existing].score) lb[existing].score = score;
      } else {
        lb.push({ username, score, avatar, date: new Date().toISOString() });
      }
      
      lb.sort((a, b) => b.score - a.score);
      localStorage.setItem(leaderboardKey, JSON.stringify(lb.slice(0, 20)));
    }

    function showLeaderboard() {
      const container = document.getElementById('leaderboardContainer');
      const lb = getLeaderboard();

      if (lb.length === 0) {
        container.innerHTML = `<p style="text-align:center; padding:60px; opacity:0.6;">Sé el primero en clasificar 🔥</p>`;
      } else {
        let html = '';
        lb.forEach((entry, i) => {
          const isYou = entry.username === username;
          html += `
            <div class="leaderboard-entry" style="${isYou ? 'border-color:#ffd700; background:rgba(255,215,0,0.1);' : ''}">
              <div class="rank-number">${i < 3 ? ['🥇','🥈','🥉'][i] : '#' + (i+1)}</div>
              <div style="font-size:2rem; width:50px;">${entry.avatar}</div>
              <div style="flex:1;">
                <strong>${entry.username}</strong> ${isYou ? '<span style="color:#ffd700;">(Tú)</span>' : ''}
              </div>
              <div style="font-size:1.6rem; font-weight:900; color:var(--accent);">${entry.score}</div>
            </div>`;
        });
        container.innerHTML = html;
      }
      showScreen('leaderboardScreen');
    }

    // ==================== Juego ====================
    function generateFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function drawGame() {
      // Fondo
      ctx.fillStyle = '#0a0a1f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Cuadrícula sutil
      ctx.strokeStyle = 'rgba(0, 245, 255, 0.08)';
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }

      // Comida con efecto neón
      ctx.shadowBlur = 25;
      ctx.shadowColor = '#ff3366';
      ctx.fillStyle = '#ff3366';
      ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

      // Serpiente
      snake.forEach((segment, i) => {
        ctx.shadowBlur = i === 0 ? 30 : 15;
        ctx.shadowColor = i === 0 ? '#00ffcc' : '#00f5ff';
        
        ctx.fillStyle = i === 0 ? '#00ffcc' : `hsl(180, 100%, ${70 - i *
